---
# ansible/roles/monitor-01/tasks/main.yml

# ── 1. System prerequisites ────────────────────────────────────────────────
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install monitoring utilities
  ansible.builtin.apt:
    name:
      - htop
      - iotop
      - iftop
      - nmap
      - curl
      - wget
      - net-tools
      - dnsutils
      - tcpdump
      - ufw
      - sysstat
      - lsof
      - tree
      - jq
    state: present

# ── 2. Install Prometheus Node Exporter ───────────────────────────────────
- name: Create prometheus user
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: /sbin/nologin
    create_home: false

- name: Download Node Exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"

- name: Extract Node Exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: true

- name: Install Node Exporter binary
  ansible.builtin.copy:
    src: /tmp/node_exporter-1.8.1.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    remote_src: true
    owner: prometheus
    group: prometheus
    mode: "0755"

- name: Create Node Exporter systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=prometheus
      Group=prometheus
      Type=simple
      ExecStart=/usr/local/bin/node_exporter
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: reload systemd

- name: Enable and start Node Exporter
  ansible.builtin.service:
    name: node_exporter
    enabled: true
    state: started

# ── 3. Create a simple monitoring script ──────────────────────────────────
- name: Deploy service-check script
  ansible.builtin.copy:
    dest: /usr/local/bin/check-services
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      # Quick health check of all InternalBoard services
      set -euo pipefail

      WEB_IP="192.168.100.11"
      DB_IP="192.168.100.12"
      WEB_PORT="5000"
      DB_PORT="5432"

      echo "============================================"
      echo " InternalBoard Service Check — $(date)"
      echo "============================================"

      check_tcp() {
        local host=$1 port=$2 label=$3
        if nc -z -w3 "$host" "$port" 2>/dev/null; then
          echo "  [OK]   $label ($host:$port)"
        else
          echo "  [FAIL] $label ($host:$port)"
        fi
      }

      check_http() {
        local url=$1 label=$2
        local status
        status=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 "$url")
        if [ "$status" = "200" ]; then
          echo "  [OK]   $label — HTTP $status"
        else
          echo "  [FAIL] $label — HTTP $status"
        fi
      }

      echo ""
      echo "TCP Checks:"
      check_tcp "$WEB_IP" "$WEB_PORT" "Flask/web-01"
      check_tcp "$DB_IP"  "$DB_PORT"  "PostgreSQL/db-01"

      echo ""
      echo "HTTP Checks:"
      check_http "http://${WEB_IP}:${WEB_PORT}/healthz" "Flask /healthz"
      check_http "http://${WEB_IP}:${WEB_PORT}/"        "Flask /"

      echo ""
      echo "============================================"

# ── 4. Firewall ────────────────────────────────────────────────────────────
- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow Node Exporter port
  community.general.ufw:
    rule: allow
    port: "9100"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny

# ── Handlers ──────────────────────────────────────────────────────────────
handlers:
  - name: reload systemd
    ansible.builtin.systemd:
      daemon_reload: true
